<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luna</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f4f1ec;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #app {
    width: 100%;
    max-width: 600px;
    height: calc(100vh - 48px);
    margin: 24px;
    display: flex;
    flex-direction: column;
    background: #fffdf9;
    border-radius: 20px;
    border: 1px solid #e7e2d8;
    box-shadow: 0 8px 28px rgba(60, 55, 45, 0.08);
    overflow: hidden;
  }

  header {
    padding: 24px 20px 18px;
    text-align: center;
    border-bottom: 1px solid #ece7dc;
  }

  header h1 {
    font-family: "Fraunces", serif;
    font-weight: 500;
    font-size: 26px;
    margin: 0;
    color: #4d6a85;
    letter-spacing: 0.3px;
  }

  header p {
    margin: 6px 0 14px;
    font-size: 13px;
    color: #8a8577;
    letter-spacing: 0.2px;
  }

  header button {
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.2px;
    padding: 7px 16px;
    border: 1px solid #dde6ea;
    border-radius: 999px;
    background: #f2f6f7;
    color: #5b7a99;
    cursor: pointer;
  }

  header button:hover {
    background: #e8eef0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 8px;
    padding: 20px;
  }

  .empty-state .empty-icon {
    color: #4d6a85;
    opacity: 0.8;
  }

  .empty-state .empty-sub {
    font-size: 14px;
    color: #9a9587;
    max-width: 32ch;
    line-height: 1.5;
  }

  .bubble {
    max-width: 75%;
    padding: 11px 16px;
    border-radius: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    font-size: 15px;
  }

  .bubble.user {
    align-self: flex-end;
    background: #4d6a85;
    color: #fdfbf7;
  }

  .bubble.assistant {
    align-self: flex-start;
    background: #f6f4ee;
    border: 1px solid #eae5d9;
    color: #3f3c35;
  }

  .bubble.system {
    align-self: center;
    color: #9a9587;
    font-size: 13px;
  }

  #input-row {
    display: flex;
    padding: 14px;
    border-top: 1px solid #ece7dc;
    gap: 8px;
  }

  #input-row input {
    flex: 1;
    padding: 11px 16px;
    border-radius: 999px;
    border: 1px solid #e2ddd0;
    background: #fbfaf6;
    color: #3f3c35;
    font-family: "Inter", sans-serif;
    font-size: 15px;
  }

  #input-row input:focus {
    outline: none;
    border-color: #a9c0d1;
    box-shadow: 0 0 0 3px rgba(91, 122, 153, 0.15);
  }

  #input-row input::placeholder {
    color: #b0aa9a;
  }

  #input-row button {
    padding: 11px 22px;
    border-radius: 999px;
    border: none;
    background: #4d6a85;
    color: #fdfbf7;
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 15px;
    cursor: pointer;
  }

  #input-row button:hover {
    background: #3e5670;
  }

  #input-row button:disabled {
    background: #d6d2c6;
    cursor: not-allowed;
  }

  #mic-btn {
    background: #fbfaf6;
    border: 1px solid #e2ddd0;
    color: #5b7a99;
    padding: 11px 14px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #mic-btn svg {
    width: 18px;
    height: 18px;
    display: block;
  }

  #mic-btn.listening {
    background: #4d6a85;
    color: #fdfbf7;
    border-color: transparent;
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.65; }
  }

  /* Scrollbar styling, purely cosmetic */
  #messages::-webkit-scrollbar {
    width: 6px;
  }

  #messages::-webkit-scrollbar-thumb {
    background: rgba(77, 106, 133, 0.2);
    border-radius: 999px;
  }
</style>
</head>
<body>

<div id="app">
  <header>
    <h1>Luna</h1>
    <p>you matter, and I'm listening</p>
    <button id="reset-btn">New conversation</button>
  </header>

  <div id="messages"></div>

  <div id="input-row">
    <input id="message-input" type="text" placeholder="What's on your mind?" autocomplete="off">
    <button id="mic-btn" title="Speak instead of typing">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </svg>
    </button>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  // Relative path: this page is now served BY the backend itself (see
  // app.mount(...) in main.py), so "same origin" is always true.
  const API_URL = "/chat";

  let conversationId = null;
  // Tracks whether the message currently being sent came from the mic
  // (speech) or the keyboard (text) — decides whether the reply gets spoken.
  let lastInputWasVoice = false;

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("message-input");
  const sendBtn = document.getElementById("send-btn");
  const resetBtn = document.getElementById("reset-btn");
  const micBtn = document.getElementById("mic-btn");

  function addBubble(text, role) {
    // Any real message clears the empty-state welcome screen, if present.
    const emptyState = messagesEl.querySelector(".empty-state");
    if (emptyState) emptyState.remove();

    const bubble = document.createElement("div");
    bubble.className = "bubble " + role;
    bubble.textContent = text;
    messagesEl.appendChild(bubble);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  async function sendMessage(fromVoice = false) {
    const text = inputEl.value.trim();
    if (!text) return;

    lastInputWasVoice = fromVoice;

    addBubble(text, "user");
    inputEl.value = "";
    inputEl.disabled = true;
    sendBtn.disabled = true;

    const thinkingBubble = addBubble("...", "assistant");

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: text,
          conversation_id: conversationId,
        }),
      });

      if (!response.ok) {
        throw new Error("Server responded with " + response.status);
      }

      const data = await response.json();
      conversationId = data.conversation_id;
      thinkingBubble.textContent = data.reply;

      // Only speak the reply if THIS turn's input came from the mic.
      // Typed messages always get a text-only reply.
      if (lastInputWasVoice) {
        speak(data.reply);
      }
    } catch (err) {
      thinkingBubble.textContent = "Something went wrong: " + err.message;
      thinkingBubble.classList.add("system");
    } finally {
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // --- Text-to-speech (spoken replies) ---
  // Generated server-side by the /speak endpoint (a free neural voice via
  // edge-tts) instead of the browser's built-in (more robotic) voices.

  const TTS_URL = "/speak";
  let currentAudio = null;

  async function speak(text) {
    if (currentAudio) {
      currentAudio.pause(); // stop any reply still being read aloud
    }
    try {
      const response = await fetch(TTS_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });

      if (!response.ok) {
        throw new Error("TTS server responded with " + response.status);
      }

      const audioBlob = await response.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      currentAudio = new Audio(audioUrl);
      currentAudio.onended = () => URL.revokeObjectURL(audioUrl);
      await currentAudio.play();
    } catch (err) {
      // The text reply is already shown either way — losing audio isn't
      // fatal, but the user should know why it stayed silent.
      addBubble("Couldn't play the spoken reply: " + err.message, "system");
    }
  }

  // --- Speech-to-text (mic input) ---

  const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognitionAPI) {
    // Not supported in this browser (e.g. Firefox) — hide the mic button
    // entirely rather than show one that doesn't work.
    micBtn.style.display = "none";
  } else {
    const recognition = new SpeechRecognitionAPI();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    let isListening = false;

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      inputEl.value = transcript;
      sendMessage(true); // true = this message came from speech
    };

    recognition.onerror = (event) => {
      addBubble("Couldn't hear you (" + event.error + "). Try again or type instead.", "system");
    };

    recognition.onend = () => {
      isListening = false;
      micBtn.classList.remove("listening");
    };

    micBtn.addEventListener("click", () => {
      if (isListening) {
        recognition.stop();
        return;
      }
      isListening = true;
      micBtn.classList.add("listening");
      recognition.start();
    });
  }

  function resetConversation() {
    conversationId = null;
    messagesEl.innerHTML = `
      <div class="empty-state">
        <svg class="empty-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20.5s-7-4.35-9.5-9.1C.9 8.2 2.4 5 5.6 5c1.9 0 3.4 1.1 4.4 2.7C11 6.1 12.5 5 14.4 5c3.2 0 4.7 3.2 3.1 6.4C15 16.15 12 20.5 12 20.5z"></path>
        </svg>
        <div class="empty-sub">I'm here whenever you're ready. Take your time.</div>
      </div>
    `;
  }

  sendBtn.addEventListener("click", () => sendMessage());
  resetBtn.addEventListener("click", resetConversation);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  resetConversation();
</script>

</body>
</html>
